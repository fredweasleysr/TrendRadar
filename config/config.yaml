# ===============================================================
# TrendRadar 终极私人定制版 (全自动抓取 + AI双语简报)
# ===============================================================

app:
  timezone: "Asia/Shanghai"
  show_version_update: false

schedule:
  enabled: true
  preset: "morning_evening"     # 每天全天增量 + 晚间汇总

# ===============================================================
# 1. 数据源配置（关闭国内热榜，只留5大国际RSS）
# ===============================================================
platforms:
  enabled: false                # 关闭今日头条/微博/知乎等抓取

rss:
  enabled: true                 # 开启 RSS 抓取
  freshness_filter:
    enabled: true
    max_age_days: 1             # 只抓取最近 1 天的新闻，保证新鲜度
  feeds:
    - id: "reuters"
      name: "Reuters (路透社)"
      url: "https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen"
    - id: "sanook"
      name: "Sanook (泰国门户)"
      url: "https://rssfeeds.sanook.com/rss/feeds/sanook/news.index.xml"
    - id: "wired"
      name: "Wired (科技趋势)"
      url: "https://www.wired.com/feed/rss"
    - id: "aljazeera"
      name: "Al Jazeera (半岛电视台)"
      url: "https://www.aljazeera.com/xml/rss/all.xml"
    - id: "bbc"
      name: "BBC World (英国广播公司)"
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"

# ===============================================================
# 2. 报告模式与 AI 智能筛选
# ===============================================================
report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true

filter:
  method: "ai"                  # 核心：开启 AI 智能筛选，不用手写关键词

ai_filter:
  batch_size: 50
  batch_interval: 2
  min_score: 0.6                # 相关度及格才推送（0.6是很好的平衡点）
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 3. 排版与推送控制
# ===============================================================
display:
  region_order:
    - ai_analysis               # 顶部显示 AI 深度总结
    - rss                       # 下方显示 RSS 原始列表
  regions:
    ai_analysis: true
    hotlist: false
    new_items: false
    rss: true                   
    standalone: false
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

# 🔴 这里填入你要接收消息的渠道（比如企业微信、Telegram、邮箱等）
notification:
  enabled: true
  channels:
    wework:
      webhook_url: ""           # 填入企业微信机器人地址
      msg_type: "markdown"

# ===============================================================
# 4. 数据保存（生成漂亮的网页版报告）
# ===============================================================
storage:
  backend: "local"
  formats:
    sqlite: true
    txt: false
    html: true                  # 开启！会在 output 目录下生成精美的网页版报告
  local:
    data_dir: "output"
    retention_days: 7

# ===============================================================
# 5. AI 大脑配置 (对接火山引擎 DeepSeek)
# ===============================================================
ai:
  # 🔴 注意：LiteLLM 兼容层要求火山引擎模型必须加上 openai/ 前缀
  model: "openai/deepseek-v3-2-251201" # 🔴 请把后缀换成你的接入点 ID (ep-xxxx)
  api_key: "0af94134-0262-4816-b153-50643f561318" 
  api_base: "https://ark.cn-beijing.volces.com/api/v3"
  timeout: 120
  temperature: 0.3
  max_tokens: 50000
  num_retries: 2

# ===============================================================
# 6. AI 翻译与深度总结
# ===============================================================
ai_analysis:
  enabled: true                 # 开启深度双语总结
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 25     # 每天只精读最重要的 25 条，省 Token
  include_rss: true             # 允许分析 RSS
  include_standalone: false
  include_rank_timeline: false

ai_translation:
  enabled: true                 # 开启外语自动翻译
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true                   # 翻译所有 RSS 标题
    standalone: false

advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
